<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quer casar comigo?</title>
    <link rel="icon" type="image/x-icon" href="chocojpg.jpg">
</head>
<style>


h1{
    color: #FF1493;
    text-align: center;
    font-size: 50px;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    margin-top: 20%;
    text-shadow: 2px 2px #FF69B4;
}
body{
    background-color: #fbe7f1;
}

.area{
    display: flex;
    justify-content: center;
    align-items: center;
    
}

#sim{
   background-color: #FF69B4; 
   color:white;
    border: none;
    padding: 20px;
    width: 100px;
    font-size:20px;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    border-radius: 10px;
    margin-right: 200px;
    
    cursor: pointer;

}

#nao {
    position: absolute; /* Adiciona posição absoluta no CSS */
    background-color: #FF69B4; 
    color: white;
    border: none;
    padding: 20px;
    width: 100px;
    font-size: 20px;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    border-radius: 10px;
    cursor: pointer;
    right: 500px;
}

#sim:hover{
    background-color: #fa61c2;
    transition: 0.3s;
    scale: 1.1;
}


</style>

<body>

   

    <h1>Quer casar comigo?</h1>
<div class="area">
    
    <a href="sim.html"><button id="sim">Sim</button></a>
    <button id="nao"> Não</button>
    
    </div>
    
    
</body>
 <script>
    const buttonNao = document.getElementById('nao');
    buttonNao.addEventListener('mouseover', setPosition); // Troquei para 'mouseover' para maior interatividade

    function setPosition() {
        // Obtém a largura e altura da janela
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;

        // Gera posições aleatórias dentro dos limites da janela
        const x = Math.random() * (windowWidth - buttonNao.offsetWidth);
        const y = Math.random() * (windowHeight - buttonNao.offsetHeight);

        // Define a posição do botão "Não"
        buttonNao.style.left = x + 'px';
        buttonNao.style.top = y + 'px';
    }
</script>
</html>
